name: Auto Sanity Check

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  sanity-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      PYTHONUNBUFFERED: 1
      # CI has no .env; provide a key + DEBUG so settings.py doesn't fail closed
      # (the insecure-default-SECRET_KEY guard only trips when DEBUG is False).
      DEBUG: 'True'
      SECRET_KEY: ci-test-secret-key-not-for-production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        id: python-deps
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        id: backend-tests
        continue-on-error: true
        run: |
          python manage.py test --verbosity=2

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        id: npm-install
        continue-on-error: true
        run: |
          cd frontend
          npm install

      - name: Build frontend
        id: build-frontend
        continue-on-error: true
        run: |
          cd frontend
          npm run build

      - name: Lint frontend
        id: lint-frontend
        continue-on-error: true
        run: |
          cd frontend
          npm run lint

      - name: Summarize sanity check results
        id: result-summary
        if: always()
        run: |
          any_failed=false
          summary=""

          if [ "${{ steps.python-deps.outcome }}" != "success" ]; then
            any_failed=true
            summary="${summary}- Python dependency install failed"$'\n'
          fi

          if [ "${{ steps.backend-tests.outcome }}" != "success" ]; then
            any_failed=true
            summary="${summary}- Backend tests failed"$'\n'
          fi

          if [ "${{ steps.npm-install.outcome }}" != "success" ]; then
            any_failed=true
            summary="${summary}- Frontend dependency install failed"$'\n'
          fi

          if [ "${{ steps.build-frontend.outcome }}" != "success" ]; then
            any_failed=true
            summary="${summary}- Frontend build failed"$'\n'
          fi

          if [ "${{ steps.lint-frontend.outcome }}" != "success" ]; then
            any_failed=true
            summary="${summary}- Frontend lint failed"$'\n'
          fi

          echo "any_failed=$any_failed" >> $GITHUB_OUTPUT
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$summary" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create or update GitHub issue for failures
        if: steps.result-summary.outputs.any_failed == 'true'
        uses: actions/github-script@v7
        env:
          ISSUE_SUMMARY: ${{ steps.result-summary.outputs.summary }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Hourly auto sanity check failures';
            const summary = process.env.ISSUE_SUMMARY || 'No details available.';
            const runUrl = process.env.RUN_URL;
            const body = `The hourly auto sanity check detected one or more failures.\n\n${summary}\nRun details: ${runUrl}`;

            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existing = issues.data.find(issue => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `Update from run: ${runUrl}\n\n${summary}`,
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }

      - name: Fail if any sanity checks failed
        if: steps.result-summary.outputs.any_failed == 'true'
        run: exit 1
